<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;

<body>

        <h1 style="font-size: 3rem; margin-bottom: 1rem;">Success! 🚀</h1>

    <script>
        const currentTheme = localStorage.getItem('theme') || 'light';

            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
